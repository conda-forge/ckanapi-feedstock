schema_version: 1

context:
  version: "4.11"

package:
  name: ckanapi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/ckanapi/ckanapi-${{ version }}.tar.gz
  sha256: 913dc04e23e16dac9357d013eefda797f2ae5b7a5b584077c10b70d7336b467e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ckanapi = ckanapi.cli.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - setuptools
    - docopt
    - requests
    - python-slugify >=1.0
    - simplejson

tests:
  - python:
      imports:
        - ckanapi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
    script:
      - ckanapi --help

about:
  summary: A command line interface and Python module for accessing the CKAN Action API
  license: MIT
  license_file:
    - COPYING.fr
    - COPYING
  homepage: https://github.com/ckan/ckanapi

extra:
  recipe-maintainers:
    - ocefpaf
