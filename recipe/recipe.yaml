schema_version: 1

context:
  version: "4.10"

package:
  name: ckanapi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/ckanapi/ckanapi-${{ version }}.tar.gz
  sha256: 5691a7cb3d8ff42f16d800f8abd276e26dfd1cbe020103e5057e6179107f7263

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ckanapi = ckanapi.cli.main:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - pip
  run:
    - python >=${{ python_min }}
    - setuptools
    - docopt
    - requests
    - python-slugify >=1.0
    - simplejson

tests:
  - python:
      imports:
        - ckanapi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
    script:
      - ckanapi --help

about:
  summary: A command line interface and Python module for accessing the CKAN Action API
  license: MIT
  license_file:
    - COPYING.fr
    - COPYING
  homepage: https://github.com/ckan/ckanapi

extra:
  recipe-maintainers:
    - ocefpaf
